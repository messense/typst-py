name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - "*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    runs-on: ${{ matrix.platform.runner || 'ubuntu-latest' }}
    strategy:
      matrix:
        platform:
          - target: x86_64
          - target: aarch64
            runner: ubuntu-24.04-arm
          - target: armv7
          - target: s390x
          - target: ppc64le
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        env:
          # Make psm compile, see https://github.com/rust-lang/stacker/issues/79
          CFLAGS_s390x_unknown_linux_gnu: "-march=z10"
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist
          sccache: "${{ matrix.platform.target == 'x86_64' && 'false' || 'true' }}"
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          before-script-linux: |
            which yum > /dev/null && yum install -y perl-core
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        env:
          # Make psm compile, see https://github.com/rust-lang/stacker/issues/79
          CFLAGS_s390x_unknown_linux_gnu: "-march=z10"
        with:
          target: ${{ matrix.platform.target }}
          args: --release --out dist -i python3.14t
          sccache: "${{ matrix.platform.target == 'x86_64' && 'false' || 'true' }}"
          manylinux: ${{ matrix.platform.manylinux || 'auto' }}
          before-script-linux: |
            which yum > /dev/null && yum install -y perl-IPC-Cmd
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
          architecture: ${{ matrix.target }}
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.14t
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-windows-${{ matrix.target }}
          path: dist

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64, aarch64]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      - uses: dtolnay/rust-toolchain@stable
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist
          sccache: "true"
      - name: Build free-threaded wheels
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          args: --release --out dist -i python3.14t
          sccache: "true"
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-macos-${{ matrix.target }}
          path: dist

  pyodide:
    runs-on: ubuntu-latest
    env:
      PYODIDE_VERSION: "0.27.7"
      RUSTUP_TOOLCHAIN: nightly-2025-08-08
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Pyodide 0.27.x bundles Python 3.12, and pyodide-build's
          # xbuildenv install rejects mismatched host Python versions.
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2025-08-08
          targets: wasm32-unknown-emscripten
      - uses: astral-sh/setup-uv@v6
      - name: Install Binaryen
        run: |
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_127/binaryen-version_127-x86_64-linux.tar.gz \
            | tar -xz -C "$RUNNER_TEMP"
          echo "EM_BINARYEN_ROOT=$RUNNER_TEMP/binaryen-version_127" >> "$GITHUB_ENV"
      - name: Build Pyodide wheel
        run: |
          set -euo pipefail
          pyodide() { uvx --from pyodide-cli --with pyodide-build pyodide "$@"; }
          pyodide xbuildenv install --skip-cross-build-packages "$PYODIDE_VERSION"
          pyodide xbuildenv use "$PYODIDE_VERSION"
          pyodide xbuildenv install-emscripten
          source "$(pyodide config get emsdk_dir)/emsdk_env.sh" >/dev/null
          export CFLAGS="$(pyodide config get cflags)"
          export CXXFLAGS='-O2 -g0 -fPIC'
          export LDFLAGS="$(pyodide config get ldflags)"
          export RUSTFLAGS="$(pyodide config get rustflags)"
          export PYO3_BUILD_EXTENSION_MODULE=1
          export PYO3_PYTHON="$(pyodide config get interpreter)"
          export PYTHON_SYS_EXECUTABLE="$PYO3_PYTHON"
          uvx maturin build --release \
            --target wasm32-unknown-emscripten \
            -i "$PYO3_PYTHON" \
            --compatibility off \
            -o dist-pyodide
      - name: Verify wheel in Pyodide on Node
        run: |
          set -euo pipefail
          wheel="$(find "$PWD/dist-pyodide" -maxdepth 1 -name '*.whl' | head -n1)"
          [[ -n "$wheel" ]] || { echo "no wheel built" >&2; exit 1; }
          cd "$RUNNER_TEMP"
          npm init -y >/dev/null
          npm install --silent "pyodide@${PYODIDE_VERSION}"
          WHEEL="$wheel" node --input-type=module <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import { pathToFileURL } from 'node:url';
          const pyodideDir = path.resolve('node_modules/pyodide');
          const { loadPyodide } = await import(pathToFileURL(path.join(pyodideDir, 'pyodide.mjs')).href);
          const pyodide = await loadPyodide({ indexURL: `${pyodideDir}/` });
          await pyodide.loadPackage('micropip');
          const wheelPath = `/tmp/${path.basename(process.env.WHEEL)}`;
          pyodide.FS.writeFile(wheelPath, fs.readFileSync(process.env.WHEEL));
          await pyodide.runPythonAsync(`
          import micropip
          await micropip.install('emfs://${wheelPath}')
          import typst
          svg = typst.compile(b'= Hello from Pyodide', format='svg')
          assert isinstance(svg, (bytes, bytearray)) and b'<svg' in svg
          `);
          NODE
      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-pyodide
          path: dist-pyodide

  sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: wheels-sdist
          path: dist

  release:
    permissions:
      # Used to upload to PyPI using trusted publisher.
      id-token: write
    name: Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [linux, windows, macos, pyodide, sdist]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          merge-multiple: true
      - name: Publish to PyPI
        uses: PyO3/maturin-action@v1
        with:
          command: upload
          args: --skip-existing *
